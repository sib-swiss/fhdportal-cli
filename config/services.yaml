# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
  # API base URL
  api.base_url: '%env(FEGA_API_URL)%'
  # Use platform-specific data directory for schema storage
  app.schema_dir: '%env(resolve:FEGA_SCHEMA_DIR)%'

services:
  # default configuration for services in *this* file
  _defaults:
    autowire: true # Automatically injects dependencies in your services.
    autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

  # makes classes in src/ available to be used as services
  # this creates a service per class whose id is the fully-qualified class name
  App\:
    resource: '../src/'
    exclude:
      - '../src/Entity/'
      - '../src/Kernel.php'

  # Application Services
  App\Service\AppDataService:
    arguments:
      $schemaDir: '%app.schema_dir%'

  App\Service\FileService:
    arguments:
      $filesystem: '@Symfony\Component\Filesystem\Filesystem'

  App\Service\SchemaService:
    arguments:
      $params: '@parameter_bag'

  App\Service\ManifestService:
    arguments:
      $schemaService: '@App\Service\SchemaService'

  App\Service\ValidationService:
    arguments:
      $fileService: '@App\Service\FileService'
      $manifestService: '@App\Service\ManifestService'
      $schemaService: '@App\Service\SchemaService'

  # Console Commands
  App\Command\ValidateCommand:
    tags: ['console.command']

  App\Command\BundleCommand:
    tags: ['console.command']

  App\Command\DocumentCommand:
    tags: ['console.command']

  App\Command\TemplateCommand:
    tags: ['console.command']

  App\Command\UpdateCommand:
    tags: ['console.command']
    arguments:
      $params: '@parameter_bag'
      $httpClient: '@Symfony\Contracts\HttpClient\HttpClientInterface'
      $filesystem: '@Symfony\Component\Filesystem\Filesystem'
      $appDataService: '@App\Service\AppDataService'
